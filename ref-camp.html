<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VH1 Basketball Officials Camp — Evaluations</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #F26522;
    --orange-dark: #D45518;
    --orange-glow: #FF8A4C;
    --black: #111111;
    --dark: #1A1A1A;
    --dark-card: #222222;
    --dark-input: #2A2A2A;
    --white: #FFFFFF;
    --gray: #999999;
    --gray-light: #CCCCCC;
    --gray-dark: #444444;
    --zebra-stripe: repeating-linear-gradient(-45deg,transparent,transparent 10px,rgba(255,255,255,0.03) 10px,rgba(255,255,255,0.03) 20px);
    --gold: #FFD700;
    --silver: #C0C0C0;
    --bronze: #CD7F32;
    --green: #4CAF50;
    --red: #E74C3C;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Source Sans 3', sans-serif; background: var(--black); color: var(--white); min-height: 100vh; overflow-x: hidden; }

  .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: var(--black); background-image: var(--zebra-stripe); padding: 2rem; }
  .login-logo-img { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; margin-bottom: 1.25rem; border: 3px solid var(--orange); box-shadow: 0 0 30px rgba(242,101,34,0.3); }
  .login-subtitle { font-family: 'Oswald', sans-serif; font-size: 1rem; color: var(--gray); text-transform: uppercase; letter-spacing: 6px; margin-bottom: 2.5rem; }
  .login-box { background: var(--dark); border: 2px solid var(--orange); border-radius: 12px; padding: 2.5rem 2rem; width: 100%; max-width: 380px; }
  .login-box h2 { font-family: 'Oswald', sans-serif; font-size: 1.3rem; text-transform: uppercase; letter-spacing: 2px; color: var(--orange); margin-bottom: 1.5rem; text-align: center; }
  .login-input { width: 100%; padding: 14px 16px; background: var(--dark-input); border: 1px solid var(--gray-dark); border-radius: 8px; color: var(--white); font-size: 1rem; font-family: 'Source Sans 3', sans-serif; margin-bottom: 1rem; transition: border-color 0.2s; }
  .login-input:focus { outline: none; border-color: var(--orange); }
  .login-input::placeholder { color: var(--gray); }
  .login-input.code-input { text-align: center; letter-spacing: 8px; font-size: 1.2rem; }
  .login-error { color: var(--red); font-size: 0.9rem; text-align: center; margin-bottom: 1rem; display: none; }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 24px; border: none; border-radius: 8px; font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; transition: all 0.2s; width: 100%; }
  .btn-primary { background: var(--orange); color: var(--white); }
  .btn-primary:hover { background: var(--orange-dark); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-outline { background: transparent; color: var(--orange); border: 2px solid var(--orange); }
  .btn-outline:hover { background: rgba(242,101,34,0.1); }
  .btn-sm { padding: 10px 18px; font-size: 0.85rem; }
  .btn-icon { background: transparent; border: 1px solid var(--gray-dark); color: var(--gray-light); width: 40px; height: 40px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .btn-icon:hover { border-color: var(--orange); color: var(--orange); }

  .app-container { display: none; min-height: 100vh; }
  .app-header { background: var(--dark); border-bottom: 3px solid var(--orange); padding: 0.75rem 1.25rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-logo { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid var(--orange); }
  .header-brand { font-family: 'Oswald', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--orange); text-transform: uppercase; letter-spacing: 2px; line-height: 1.1; }
  .header-brand-sub { font-size: 0.65rem; color: var(--gray); letter-spacing: 3px; text-transform: uppercase; }
  .header-clinician { font-size: 0.6rem; color: var(--orange-glow); letter-spacing: 1px; margin-top: 1px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  .tab-nav { display: flex; background: var(--dark); border-bottom: 1px solid var(--gray-dark); overflow-x: auto; }
  .tab-btn { flex: 1; min-width: 0; padding: 14px 8px; background: transparent; border: none; border-bottom: 3px solid transparent; color: var(--gray); font-family: 'Oswald', sans-serif; font-size: 0.85rem; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .tab-btn:hover { color: var(--white); }
  .tab-btn.active { color: var(--orange); border-bottom-color: var(--orange); }
  .tab-content { display: none; padding: 1.5rem; max-width: 800px; margin: 0 auto; }
  .tab-content.active { display: block; }

  .section-label { font-family: 'Oswald', sans-serif; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: var(--gray); margin-bottom: 0.75rem; }
  select.form-select { width: 100%; padding: 14px 16px; background: var(--dark-input); border: 1px solid var(--gray-dark); border-radius: 8px; color: var(--white); font-size: 1rem; font-family: 'Source Sans 3', sans-serif; appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 6L11 1' stroke='%23999' stroke-width='2'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 16px center; cursor: pointer; }
  select.form-select:focus { outline: none; border-color: var(--orange); }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--gray); margin-bottom: 0.4rem; }
  .form-input { width: 100%; padding: 12px 14px; background: var(--dark-input); border: 1px solid var(--gray-dark); border-radius: 8px; color: var(--white); font-size: 1rem; font-family: 'Source Sans 3', sans-serif; }
  .form-input:focus { outline: none; border-color: var(--orange); }
  .comments-box { width: 100%; padding: 14px 16px; background: var(--dark-input); border: 1px solid var(--gray-dark); border-radius: 8px; color: var(--white); font-size: 0.95rem; font-family: 'Source Sans 3', sans-serif; resize: vertical; min-height: 80px; }
  .comments-box:focus { outline: none; border-color: var(--orange); }
  .comments-box::placeholder { color: var(--gray); }

  .eval-card { background: var(--dark-card); border-radius: 12px; border: 1px solid var(--gray-dark); padding: 1.25rem; margin-bottom: 1rem; }
  .eval-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
  .eval-category { font-family: 'Oswald', sans-serif; font-size: 1.05rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
  .eval-score-display { font-family: 'Oswald', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--orange); min-width: 30px; text-align: right; }

  .score-boxes { display: flex; gap: 6px; flex-wrap: wrap; }
  .score-box { width: 40px; height: 40px; border-radius: 8px; border: 2px solid var(--gray-dark); background: var(--dark-input); color: var(--gray); font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; user-select: none; -webkit-tap-highlight-color: transparent; }
  .score-box:hover { border-color: var(--orange); color: var(--orange); }
  .score-box.selected { background: var(--orange); border-color: var(--orange); color: var(--white); }

  .yn-row { display: flex; align-items: center; gap: 12px; margin-bottom: 0.75rem; }
  .yn-label { font-family: 'Oswald', sans-serif; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; flex: 1; }
  .yn-btns { display: flex; gap: 6px; }
  .yn-btn { padding: 8px 20px; border-radius: 8px; border: 2px solid var(--gray-dark); background: transparent; color: var(--gray-light); font-family: 'Oswald', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 1px; }
  .yn-btn:hover { border-color: var(--orange); }
  .yn-btn.yes-selected { background: var(--green); border-color: var(--green); color: var(--white); }
  .yn-btn.no-selected { background: var(--red); border-color: var(--red); color: var(--white); }
  .followup { margin-left: 1.5rem; padding-left: 1rem; border-left: 3px solid var(--orange); margin-bottom: 0.75rem; display: none; }
  .followup.show { display: block; }

  .overall-score-card { background: linear-gradient(135deg, var(--orange-dark), var(--orange)); border-radius: 12px; padding: 1.25rem; margin: 1.5rem 0; text-align: center; }
  .overall-label { font-family: 'Oswald', sans-serif; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 3px; opacity: 0.8; }
  .overall-score { font-family: 'Oswald', sans-serif; font-size: 3rem; font-weight: 700; line-height: 1.1; }

  .ranking-card { display: flex; align-items: center; background: var(--dark-card); border-radius: 12px; border: 1px solid var(--gray-dark); padding: 1rem 1.25rem; margin-bottom: 0.75rem; }
  .ranking-card.rank-1 { border-color: var(--gold); }
  .ranking-card.rank-2 { border-color: var(--silver); }
  .ranking-card.rank-3 { border-color: var(--bronze); }
  .rank-badge { font-family: 'Oswald', sans-serif; font-size: 1.5rem; font-weight: 700; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 1rem; flex-shrink: 0; background: var(--gray-dark); color: var(--white); }
  .rank-1 .rank-badge { background: var(--gold); color: var(--black); }
  .rank-2 .rank-badge { background: var(--silver); color: var(--black); }
  .rank-3 .rank-badge { background: var(--bronze); color: var(--white); }
  .rank-info { flex: 1; min-width: 0; }
  .rank-name { font-family: 'Oswald', sans-serif; font-size: 1.1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
  .rank-details { font-size: 0.8rem; color: var(--gray); margin-top: 2px; }
  .rank-avg { font-family: 'Oswald', sans-serif; font-size: 1.8rem; font-weight: 700; color: var(--orange); margin-left: 1rem; flex-shrink: 0; }
  .rank-bar-container { margin-top: 0.5rem; }
  .rank-bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .rank-bar-label { font-size: 0.65rem; color: var(--gray); width: 55px; text-align: right; text-transform: uppercase; flex-shrink: 0; }
  .rank-bar-bg { flex: 1; height: 6px; background: var(--gray-dark); border-radius: 3px; overflow: hidden; }
  .rank-bar-fill { height: 100%; background: var(--orange); border-radius: 3px; transition: width 0.5s ease; }
  .rank-bar-val { font-size: 0.65rem; color: var(--gray-light); width: 24px; flex-shrink: 0; }
  .rank-badges-row { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .rank-tag { font-size: 0.6rem; padding: 2px 8px; border-radius: 4px; font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; }
  .rank-tag.rmac { background: rgba(76,175,80,0.2); color: var(--green); }
  .rank-tag.conf { background: rgba(242,101,34,0.2); color: var(--orange); }
  .rank-tag.top10 { background: rgba(255,215,0,0.2); color: var(--gold); }
  .filter-row { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .filter-chip { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--gray-dark); background: transparent; color: var(--gray-light); font-family: 'Oswald', sans-serif; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
  .filter-chip:hover { border-color: var(--orange); color: var(--orange); }
  .filter-chip.active { background: var(--orange); color: var(--white); border-color: var(--orange); }

  .camper-row { display: flex; align-items: center; justify-content: space-between; background: var(--dark-card); border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 0.5rem; border: 1px solid var(--gray-dark); }
  .camper-row-name { font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 600; text-transform: uppercase; }
  .camper-row-email { font-size: 0.8rem; color: var(--gray); }

  .upload-zone { border: 2px dashed var(--gray-dark); border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 1rem; }
  .upload-zone:hover { border-color: var(--orange); }
  .upload-zone-text { font-family: 'Oswald', sans-serif; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: var(--gray); }
  .upload-zone-sub { font-size: 0.8rem; color: var(--gray-dark); margin-top: 0.5rem; }
  .upload-preview { background: var(--dark-card); border-radius: 10px; padding: 1rem; margin-bottom: 1rem; border: 1px solid var(--gray-dark); max-height: 200px; overflow-y: auto; }
  .upload-preview-row { font-size: 0.85rem; padding: 4px 0; color: var(--gray-light); border-bottom: 1px solid rgba(255,255,255,0.05); }

  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; padding: 1.5rem; }
  .modal-overlay.active { display: flex; }
  .modal-box { background: var(--dark); border: 2px solid var(--orange); border-radius: 12px; padding: 2rem; width: 100%; max-width: 420px; }
  .modal-box h2 { font-family: 'Oswald', sans-serif; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; color: var(--orange); margin-bottom: 1.5rem; }
  .modal-actions { display: flex; gap: 10px; margin-top: 1.5rem; }
  .modal-actions .btn { flex: 1; }

  .email-status { display: flex; align-items: center; gap: 8px; padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 0.5rem; font-size: 0.9rem; }
  .email-status.success { background: rgba(76,175,80,0.15); color: var(--green); }
  .email-status.error { background: rgba(231,76,60,0.15); color: var(--red); }
  .email-status.pending { background: rgba(242,101,34,0.15); color: var(--orange); }

  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--green); color: var(--white); padding: 14px 28px; border-radius: 10px; font-family: 'Oswald', sans-serif; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; z-index: 300; transition: transform 0.3s ease; pointer-events: none; max-width: 90vw; text-align: center; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--red); }
  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--gray); }
  .empty-state-icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty-state-text { font-family: 'Oswald', sans-serif; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: var(--white); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .login-logo-img { width: 140px; height: 140px; }
    .app-header { padding: 0.6rem 0.75rem; }
    .header-brand { font-size: 1rem; letter-spacing: 1px; }
    .header-logo { width: 36px; height: 36px; }
    .tab-content { padding: 1rem; }
    .score-box { width: 34px; height: 34px; font-size: 0.85rem; }
  }
</style>
</head>

const supaFetch = async (table, method = 'GET', body = null, query = '') => {
  const url = `${CONFIG.SUPABASE_URL}/rest/v1/${table}${query}`;
  const headers = { 'apikey': CONFIG.SUPABASE_KEY, 'Authorization': `Bearer ${CONFIG.SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': method === 'POST' ? 'return=representation' : (method === 'PATCH' ? 'return=representation' : '') };
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok) throw new Error(`Supabase error: ${res.status}`);
  const text = await res.text();
  return text ? JSON.parse(text) : null;
};

function attemptLogin() {
  const name = document.getElementById('clinicianName').value.trim();
  const pw = document.getElementById('loginPassword').value;
  if (!name) { showLoginError('Please enter your name.'); return; }
  if (pw !== CONFIG.ACCESS_CODE) { showLoginError('Incorrect code. Try again.'); document.getElementById('loginPassword').value = ''; return; }
  currentClinician = name;
  document.getElementById('displayClinician').textContent = name;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appContainer').style.display = 'block';
  loadAllData();
}
function showLoginError(msg) { const el = document.getElementById('loginError'); el.textContent = msg; el.style.display = 'block'; }
function logout() {
  currentClinician = '';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appContainer').style.display = 'none';
  document.getElementById('loginPassword').value = '';
  document.getElementById('clinicianName').value = '';
  document.getElementById('loginError').style.display = 'none';
}

async function loadAllData() {
  try {
    campers = await supaFetch('campers', 'GET', null, '?order=last_name.asc') || [];
    evaluations = await supaFetch('evaluations', 'GET', null, '?order=created_at.desc') || [];
  } catch (e) { console.error('Load error:', e); }
  populateCamperSelect(); renderCampersList(); renderRankings(); buildEvalForm();
}

function populateCamperSelect() {
  const sel = document.getElementById('evalCamperSelect');
  sel.innerHTML = '<option value="">— Choose a camper —</option>';
  campers.forEach(c => { const o = document.createElement('option'); o.value = c.id; o.textContent = `${c.first_name} ${c.last_name}`; sel.appendChild(o); });
}

function buildEvalForm() {
  const container = document.getElementById('evalCards');
  container.innerHTML = '';
  CONFIG.CATEGORIES.forEach((cat, i) => {
    let boxes = '';
    for (let n = 1; n <= 10; n++) boxes += `<div class="score-box" data-cat="${i}" data-val="${n}" onclick="selectScore(${i},${n})">${n}</div>`;
    container.innerHTML += `<div class="eval-card"><div class="eval-card-header"><div class="eval-category">${cat}</div><div class="eval-score-display" id="scoreDisplay_${i}">—</div></div><div class="score-boxes" id="scoreBoxes_${i}">${boxes}</div></div>`;
  });
}

function selectScore(ci, val) {
  document.querySelectorAll(`#scoreBoxes_${ci} .score-box`).forEach(b => b.classList.remove('selected'));
  document.querySelector(`#scoreBoxes_${ci} .score-box[data-val="${val}"]`).classList.add('selected');
  document.getElementById(`scoreDisplay_${ci}`).textContent = val;
  updateOverall();
}
function getScore(ci) { const s = document.querySelector(`#scoreBoxes_${ci} .score-box.selected`); return s ? parseInt(s.dataset.val) : null; }
function updateOverall() {
  let t = 0, c = 0;
  CONFIG.CATEGORIES.forEach((_, i) => { const v = getScore(i); if (v !== null) { t += v; c++; } });
  document.getElementById('overallScore').textContent = c > 0 ? (t / c).toFixed(1) : '0.0';
}

function setYN(field, val, btn) {
  ynState[field] = val === 'yes';
  btn.parentElement.querySelectorAll('.yn-btn').forEach(b => b.classList.remove('yes-selected', 'no-selected'));
  btn.classList.add(val === 'yes' ? 'yes-selected' : 'no-selected');
  if (field === 'rmac') {
    const fu = document.getElementById('confFollowup');
    if (val === 'yes') { fu.classList.add('show'); } else { fu.classList.remove('show'); ynState.conference = null; fu.querySelectorAll('.yn-btn').forEach(b => b.classList.remove('yes-selected', 'no-selected')); }
  }
}
function resetYN() { ynState = { rmac: null, conference: null, top10: null }; document.querySelectorAll('.yn-btn').forEach(b => b.classList.remove('yes-selected', 'no-selected')); document.getElementById('confFollowup').classList.remove('show'); }

function loadExistingEval() {
  const cid = document.getElementById('evalCamperSelect').value;
  const form = document.getElementById('evalForm');
  if (!cid) { form.style.display = 'none'; return; }
  form.style.display = 'block';
  document.getElementById('submitStatus').innerHTML = '';
  const ex = evaluations.find(e => e.camper_id === cid && e.clinician_name === currentClinician);
  if (ex && ex.scores) {
    CONFIG.CATEGORIES.forEach((cat, i) => {
      const key = cat.toLowerCase().replace(/\s+/g, '_');
      const val = ex.scores[key];
      document.querySelectorAll(`#scoreBoxes_${i} .score-box`).forEach(b => b.classList.remove('selected'));
      if (val) { const box = document.querySelector(`#scoreBoxes_${i} .score-box[data-val="${val}"]`); if (box) box.classList.add('selected'); document.getElementById(`scoreDisplay_${i}`).textContent = val; } else { document.getElementById(`scoreDisplay_${i}`).textContent = '—'; }
    });
    document.getElementById('evalComments').value = ex.comments || '';
    resetYN();
    if (ex.scores.rmac_ready != null) { ynState.rmac = ex.scores.rmac_ready; const btns = document.querySelectorAll('#ynCard > .yn-row:first-child .yn-btn'); btns.forEach(b => { if ((b.textContent==='Yes'&&ynState.rmac)||(b.textContent==='No'&&!ynState.rmac)) b.classList.add(ynState.rmac?'yes-selected':'no-selected'); }); if (ynState.rmac) { document.getElementById('confFollowup').classList.add('show'); if (ex.scores.conference_ready != null) { ynState.conference = ex.scores.conference_ready; document.querySelectorAll('#confFollowup .yn-btn').forEach(b => { if ((b.textContent==='Yes'&&ynState.conference)||(b.textContent==='No'&&!ynState.conference)) b.classList.add(ynState.conference?'yes-selected':'no-selected'); }); } } }
    if (ex.scores.top10 != null) { ynState.top10 = ex.scores.top10; const btns = document.querySelectorAll('#ynCard > .yn-row:last-child .yn-btn'); btns.forEach(b => { if ((b.textContent==='Yes'&&ynState.top10)||(b.textContent==='No'&&!ynState.top10)) b.classList.add(ynState.top10?'yes-selected':'no-selected'); }); }
  } else {
    CONFIG.CATEGORIES.forEach((_, i) => { document.querySelectorAll(`#scoreBoxes_${i} .score-box`).forEach(b => b.classList.remove('selected')); document.getElementById(`scoreDisplay_${i}`).textContent = '—'; });
    document.getElementById('evalComments').value = ''; resetYN();
  }
  updateOverall();
}

async function submitEvaluation() {
  const cid = document.getElementById('evalCamperSelect').value;
  if (!cid) return;
  let allFilled = true;
  CONFIG.CATEGORIES.forEach((_, i) => { if (getScore(i) === null) allFilled = false; });
  if (!allFilled) { showToast('Please score all categories', true); return; }

  const btn = document.getElementById('submitEvalBtn');
  const statusEl = document.getElementById('submitStatus');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>'; statusEl.innerHTML = '';

  const scores = {};
  CONFIG.CATEGORIES.forEach((cat, i) => { scores[cat.toLowerCase().replace(/\s+/g, '_')] = getScore(i); });
  scores.rmac_ready = ynState.rmac;
  scores.conference_ready = ynState.conference;
  scores.top10 = ynState.top10;

  const comments = document.getElementById('evalComments').value.trim();
  const overall = parseFloat(document.getElementById('overallScore').textContent);
  const existing = evaluations.find(e => e.camper_id === cid && e.clinician_name === currentClinician);

  try {
    if (existing) { await supaFetch('evaluations', 'PATCH', { scores, comments, overall_score: overall }, `?id=eq.${existing.id}`); }
    else { await supaFetch('evaluations', 'POST', { camper_id: cid, clinician_name: currentClinician, scores, comments, overall_score: overall }); }
    statusEl.innerHTML = '<div class="email-status success">✓ Evaluation saved</div>';

    const camper = campers.find(c => c.id === cid);
    if (camper && camper.email) {
      statusEl.innerHTML += '<div class="email-status pending">Sending email...</div>';
      evaluations = await supaFetch('evaluations', 'GET', null, '?order=created_at.desc') || [];
      const camperEvals = evaluations.filter(e => e.camper_id === cid);
      try {
        const res = await fetch(CONFIG.SENDGRID_FUNCTION_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ to: camper.email, from: CONFIG.FROM_EMAIL, subject: `${CONFIG.CAMP_NAME} — Your Evaluation Results`, html: buildEmailBody(camper, camperEvals) }) });
        statusEl.innerHTML = res.ok ? '<div class="email-status success">✓ Saved & emailed to camper</div>' : '<div class="email-status success">✓ Saved</div><div class="email-status error">✕ Email failed</div>';
      } catch (e) { statusEl.innerHTML = '<div class="email-status success">✓ Saved</div><div class="email-status error">✕ Email failed</div>'; }
    } else { statusEl.innerHTML = '<div class="email-status success">✓ Saved (no email on file)</div>'; }
    await loadAllData(); showToast('Evaluation saved!');
  } catch (e) { console.error(e); showToast('Error saving', true); statusEl.innerHTML = '<div class="email-status error">✕ Error saving</div>'; }
  btn.disabled = false; btn.textContent = 'Submit & Email Camper';
}

function buildEmailBody(camper, evals) {
  const catTotals = {}; CONFIG.CATEGORIES.forEach(cat => { catTotals[cat] = []; });
  evals.forEach(ev => { CONFIG.CATEGORIES.forEach(cat => { const k = cat.toLowerCase().replace(/\s+/g, '_'); if (ev.scores?.[k] != null) catTotals[cat].push(ev.scores[k]); }); });
  const catRows = CONFIG.CATEGORIES.map(cat => { const v = catTotals[cat]; const avg = v.length ? (v.reduce((a,b)=>a+b,0)/v.length).toFixed(1) : 'N/A'; const pct = v.length ? ((v.reduce((a,b)=>a+b,0)/v.length)/10)*100 : 0; return `<tr><td style="padding:8px 12px;border-bottom:1px solid #333;color:#fff;font-weight:600;">${cat}</td><td style="padding:8px 12px;border-bottom:1px solid #333;"><div style="background:#333;border-radius:4px;height:12px;width:100%;overflow:hidden;"><div style="background:#F26522;height:100%;width:${pct}%;border-radius:4px;"></div></div></td><td style="padding:8px 12px;border-bottom:1px solid #333;color:#F26522;font-weight:700;text-align:center;font-size:18px;">${avg}</td></tr>`; }).join('');
  const ov = evals.map(e=>e.overall_score).filter(v=>v!=null); const overall = ov.length ? (ov.reduce((a,b)=>a+b,0)/ov.length).toFixed(1) : 'N/A';
  const cmt = evals.filter(e=>e.comments).map(e=>`<div style="background:#222;border-radius:8px;padding:12px;margin-bottom:8px;border-left:3px solid #F26522;"><div style="font-size:12px;color:#999;margin-bottom:4px;">${e.clinician_name||'Clinician'}</div><div style="color:#ccc;line-height:1.5;">${e.comments}</div></div>`).join('');
  return `<div style="max-width:600px;margin:0 auto;background:#111;border-radius:12px;overflow:hidden;font-family:Arial,sans-serif;"><div style="background:#F26522;padding:24px;text-align:center;"><h1 style="color:#fff;margin:0;font-size:24px;letter-spacing:2px;">${CONFIG.CAMP_NAME}</h1><p style="color:rgba(255,255,255,0.8);margin:4px 0 0;font-size:14px;">EVALUATION RESULTS</p></div><div style="padding:24px;"><h2 style="color:#F26522;margin:0 0 4px;font-size:20px;">${camper.first_name} ${camper.last_name}</h2><p style="color:#999;margin:0 0 12px;font-size:14px;">${evals.length} evaluation${evals.length!==1?'s':''}</p><table style="width:100%;border-collapse:collapse;"><thead><tr><th style="padding:8px 12px;text-align:left;color:#999;font-size:12px;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid #F26522;">Category</th><th style="padding:8px 12px;text-align:left;color:#999;font-size:12px;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid #F26522;">Score</th><th style="padding:8px 12px;text-align:center;color:#999;font-size:12px;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid #F26522;width:50px;">Avg</th></tr></thead><tbody>${catRows}</tbody></table><div style="background:linear-gradient(135deg,#D45518,#F26522);border-radius:10px;padding:20px;margin:20px 0;text-align:center;"><div style="color:rgba(255,255,255,0.8);font-size:12px;text-transform:uppercase;letter-spacing:3px;">Overall Average</div><div style="color:#fff;font-size:42px;font-weight:700;line-height:1.1;">${overall}</div><div style="color:rgba(255,255,255,0.6);font-size:12px;">out of 10</div></div>${cmt?`<h3 style="color:#F26522;font-size:14px;text-transform:uppercase;letter-spacing:2px;margin:20px 0 12px;">Feedback</h3>${cmt}`:''}<p style="color:#666;font-size:12px;text-align:center;margin-top:24px;">${CONFIG.CAMP_NAME} • June 18–20, 2026</p></div></div>`;
}

function renderRankings() {
  const fr = document.getElementById('rankFilter'); fr.innerHTML = '';
  ['overall',...CONFIG.CATEGORIES,'top10'].forEach(cat => {
    const c = document.createElement('button');
    c.className = `filter-chip ${cat===rankSortCategory?'active':''}`;
    c.textContent = cat==='overall'?'Overall':cat==='top10'?'Top 10 Only':cat;
    c.onclick = ()=>{ rankSortCategory=cat; renderRankings(); };
    fr.appendChild(c);
  });
  const cs = {};
  campers.forEach(c => { const ev = evaluations.filter(e=>e.camper_id===c.id); if(!ev.length) return; const ca = {}; CONFIG.CATEGORIES.forEach(cat=>{ const k=cat.toLowerCase().replace(/\s+/g,'_'); const v=ev.map(e=>e.scores?.[k]).filter(v=>v!=null); ca[cat]=v.length?v.reduce((a,b)=>a+b,0)/v.length:0; }); const ov=ev.map(e=>e.overall_score).filter(v=>v!=null); const o=ov.length?ov.reduce((a,b)=>a+b,0)/ov.length:0; const h=ev.length/2; cs[c.id]={camper:c,catAverages:ca,overall:o,evalCount:ev.length,rmac:ev.filter(e=>e.scores?.rmac_ready===true).length>=Math.max(h,1),conference:ev.filter(e=>e.scores?.conference_ready===true).length>=Math.max(h,1),top10:ev.filter(e=>e.scores?.top10===true).length>=Math.max(h,1),clinicians:[...new Set(ev.map(e=>e.clinician_name).filter(Boolean))]}; });
  let sorted = Object.values(cs);
  // Filter for Top 10 only view
  if (rankSortCategory==='top10') { sorted = sorted.filter(e=>e.top10); sorted.sort((a,b)=>b.overall-a.overall); }
  else if (rankSortCategory==='overall') sorted.sort((a,b)=>b.overall-a.overall);
  else sorted.sort((a,b)=>(b.catAverages[rankSortCategory]||0)-(a.catAverages[rankSortCategory]||0));
  const list = document.getElementById('rankingsList');
  if (!sorted.length) { list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📊</div><div class="empty-state-text">'+(rankSortCategory==='top10'?'No Top 10 campers yet':'No evaluations yet')+'</div></div>'; return; }
  list.innerHTML = sorted.map((e,idx) => { const rc=idx<3?`rank-${idx+1}`:''; const ds=rankSortCategory==='overall'||rankSortCategory==='top10'?e.overall.toFixed(1):(e.catAverages[rankSortCategory]||0).toFixed(1); const bars=CONFIG.CATEGORIES.map(cat=>{ const v=e.catAverages[cat]||0; const p=(v/10)*100; const s=cat.length>7?cat.substring(0,7):cat; return `<div class="rank-bar-row"><span class="rank-bar-label">${s}</span><div class="rank-bar-bg"><div class="rank-bar-fill" style="width:${p}%"></div></div><span class="rank-bar-val">${v.toFixed(1)}</span></div>`; }).join(''); let tags=''; if(e.rmac) tags+='<span class="rank-tag rmac">RMAC</span>'; if(e.conference) tags+='<span class="rank-tag conf">Conference</span>'; if(e.top10) tags+='<span class="rank-tag top10">Top 10</span>'; return `<div class="ranking-card ${rc}"><div class="rank-badge">${idx+1}</div><div class="rank-info"><div class="rank-name">${e.camper.first_name} ${e.camper.last_name}</div><div class="rank-details">${e.evalCount} eval${e.evalCount!==1?'s':''} · ${e.clinicians.join(', ')}</div>${tags?`<div class="rank-badges-row">${tags}</div>`:''}<div class="rank-bar-container">${bars}</div></div><div class="rank-avg">${ds}</div></div>`; }).join('');
}

function renderCampersList() {
  const l = document.getElementById('campersList');
  if (!campers.length) { l.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🏀</div><div class="empty-state-text">No campers added yet</div></div>'; return; }
  l.innerHTML = campers.map(c=>`<div class="camper-row"><div><div class="camper-row-name">${c.first_name} ${c.last_name}</div><div class="camper-row-email">${c.email||'No email'}</div></div><div class="camper-row-actions"><button class="btn-icon" title="Delete" onclick="deleteCamper('${c.id}')">✕</button></div></div>`).join('');
}

function openAddCamper(){document.getElementById('addCamperModal').classList.add('active');document.getElementById('newCamperFirst').value='';document.getElementById('newCamperLast').value='';document.getElementById('newCamperEmail').value='';}
function closeAddCamper(){document.getElementById('addCamperModal').classList.remove('active');}
async function saveCamper(){const f=document.getElementById('newCamperFirst').value.trim();const l=document.getElementById('newCamperLast').value.trim();const e=document.getElementById('newCamperEmail').value.trim();if(!f||!l){showToast('Name required',true);return;}try{await supaFetch('campers','POST',{first_name:f,last_name:l,email:e||null});closeAddCamper();showToast('Camper added!');await loadAllData();}catch(er){showToast('Error adding',true);}}
async function deleteCamper(id){if(!confirm('Delete camper and evaluations?'))return;try{await supaFetch('evaluations','DELETE',null,`?camper_id=eq.${id}`);await supaFetch('campers','DELETE',null,`?id=eq.${id}`);showToast('Removed');await loadAllData();}catch(e){showToast('Error',true);}}

function openCSVUpload(){csvParsedData=[];document.getElementById('csvModal').classList.add('active');document.getElementById('csvPreview').style.display='none';document.getElementById('csvUploadBtn').style.display='none';document.getElementById('csvFileInput').value='';}
function closeCSVUpload(){document.getElementById('csvModal').classList.remove('active');}
function handleCSVFile(file){if(!file)return;const r=new FileReader();r.onload=(e)=>{const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim());csvParsedData=[];const fl=lines[0].toLowerCase();const si=(fl.includes('first')||fl.includes('name')||fl.includes('email'))?1:0;for(let i=si;i<lines.length;i++){const p=lines[i].split(',').map(s=>s.trim().replace(/^["']|["']$/g,''));if(p.length>=2)csvParsedData.push({first_name:p[0],last_name:p[1],email:p[2]||null});}if(csvParsedData.length){document.getElementById('csvCount').textContent=csvParsedData.length;document.getElementById('csvPreviewList').innerHTML=csvParsedData.map(c=>`<div class="upload-preview-row">${c.first_name} ${c.last_name}${c.email?' — '+c.email:''}</div>`).join('');document.getElementById('csvPreview').style.display='block';document.getElementById('csvUploadBtn').style.display='block';}else showToast('No valid data',true);};r.readAsText(file);}

const dz=document.getElementById('csvDropZone');
if(dz){dz.addEventListener('dragover',e=>{e.preventDefault();dz.style.borderColor='var(--orange)';});dz.addEventListener('dragleave',()=>{dz.style.borderColor='';});dz.addEventListener('drop',e=>{e.preventDefault();dz.style.borderColor='';if(e.dataTransfer.files.length)handleCSVFile(e.dataTransfer.files[0]);});}

async function uploadCSVCampers(){const btn=document.getElementById('csvUploadBtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';let s=0;try{await supaFetch('campers','POST',csvParsedData);s=csvParsedData.length;}catch(e){for(const c of csvParsedData){try{await supaFetch('campers','POST',c);s++;}catch(er){}}}btn.disabled=false;btn.textContent='Upload All';closeCSVUpload();showToast(`${s} campers uploaded!`);await loadAllData();}

function switchTab(tab){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase().trim()===tab));document.querySelectorAll('.tab-content').forEach(el=>el.classList.toggle('active',el.id===`tab-${tab}`));if(tab==='rankings')renderRankings();}
function showToast(msg,err=false){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${err?'error':''} show`;setTimeout(()=>t.classList.remove('show'),2500);}
</script>
